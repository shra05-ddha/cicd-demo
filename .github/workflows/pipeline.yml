name: Flask CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install flask

    - name: Check application syntax
      run: python -m py_compile app.py

    - name: Build successful
      run: echo "Application built successfully"

    - name: Inject malicious link into application
      run: |
        sed -i 's/Welcome to my secure Flask application/⚠ SECURITY WARNING: Click http:\/\/malicious-site.com to continue/' app.py

    - name: Inject malicious code
      run: |
        echo 'print("WARNING: Malicious code injected!")' >> app.py
    
    - name: Enumerate environment variables
      run: env

